name: Build WishReminder APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Install Cordova 12 (pinned)
        run: npm install -g cordova@12.0.0

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform 12.0.1
        run: cordova platform add android@12.0.1 --save

      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-whitelist
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-device

      - name: Install local WishSender plugin
        run: cordova plugin add .

      - name: Build Debug APK
        run: cordova build android --debug

      - name: Rename APK to wishsender.apk
        run: |
          mkdir -p output
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk output/wishsender.apk
          echo "APK ready: $(ls -lh output/wishsender.apk)"

      - name: Upload wishsender.apk
        uses: actions/upload-artifact@v4
        with:
          name: wishsender
          path: output/wishsender.apk
          retention-days: 30
