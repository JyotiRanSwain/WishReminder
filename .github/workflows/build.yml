name: Build WishReminder APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest # Using latest for better action support
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # This is the "Magic" step. It forces the system to use 8.7 
      # and ignores the pre-installed 9.4.1.
      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Install Cordova
        run: npm install -g cordova@12.0.0

      - name: Install npm dependencies
        run: npm install

      - name: Prepare Platform
        run: cordova platform add android@12.0.1 --save

      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-inappbrowser || true
          cordova plugin add cordova-plugin-device || true
          cordova plugin add ./plugin

      - name: Build Debug APK
        # We set the CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL env var 
        # to double-down on forcing the version.
        env:
          CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.7-bin.zip
        run: cordova build android --debug --device

      - name: Rename and Move APK
        run: |
          mkdir -p output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/wishsender.apk \;

      - name: Upload wishsender.apk
        uses: actions/upload-artifact@v4
        with:
          name: wishsender
          path: output/wishsender.apk
          retention-days: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          # This ensures the JAVA_HOME is set correctly for the shell
          check-latest: false

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova@12.0.0

      - name: Install npm dependencies
        run: npm install

      - name: Prepare Platform
        run: cordova platform add android@12.0.1 --save

      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-device
          cordova plugin add ./plugin

      # FORCE Gradle 8.7 inside the actual Android project
      # This fixes the "XmlParser" error by replacing the Gradle 9.x files
      - name: Force Gradle 8.7 Wrapper
        run: |
          cd platforms/android
          gradle wrapper --gradle-version 8.7

      - name: Build Debug APK
        # We use --device to ignore emulator requirements
        run: cordova build android --debug --device --verbose

      - name: Rename and Move APK
        run: |
          mkdir -p output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/wishsender.apk \;

      - name: Upload wishsender.apk
        uses: actions/upload-artifact@v4
        with:
          name: wishsender
          path: output/wishsender.apk
          retention-days: 30
