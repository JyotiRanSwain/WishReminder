name: Build WishReminder APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '33.0.2'

      - name: Install Cordova
        run: npm install -g cordova@12.0.0

      - name: Install npm dependencies
        run: npm install

      - name: Clean and Prepare Plugin
        run: |
          # Adding platform if not exists
          cordova platform add android@12.0.1 --save || true
          # FORCE removal and addition of the local plugin to sync strings.xml
          cordova plugin remove cordova-plugin-wish-sender || true
          cordova plugin add ./plugin
          # Syncs files to platforms/android folder
          cordova prepare android

      - name: Build Debug APK
        env:
          CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.7-bin.zip
        run: cordova build android --debug --device

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wishsender
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
