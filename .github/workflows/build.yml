name: Build WishReminder APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Fixes the Gradle 9 / XmlParser error by pinning to 8.7
      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      # Required for Cordova 12's internal requirement checks
      - name: Install Specific Build Tools 33.0.2
        run: |
          sdkmanager "build-tools;33.0.2"

      - name: Install Cordova
        run: npm install -g cordova@12.0.0

      - name: Install npm dependencies
        run: npm install

      - name: Fresh Prepare Platform and Local Plugin
        run: |
          # 1. Complete Cleanup: Remove existing folders to avoid XML conflicts
          rm -rf platforms/android
          rm -rf plugins/cordova-plugin-wish-sender
          
          # 2. Add local plugin first: 
          # This ensures Cordova has the plugin manifest ready before creating the platform
          cordova plugin add ./plugin
          
          # 3. Add Android Platform:
          # This will now correctly merge the plugin's config-file into the new strings.xml
          cordova platform add android@12.0.1 --save
          
          # 4. Final sync
          cordova prepare android

      - name: Build Debug APK
        env:
          # Ensures the internal gradlew uses the correct version
          CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.7-bin.zip
        run: cordova build android --debug --device

      - name: Rename and Move APK
        if: success()
        run: |
          mkdir -p output
          # Locate the APK regardless of the internal folder structure
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/wishsender.apk \;
          echo "Build Complete. Artifact found at output/wishsender.apk"

      - name: Upload wishsender.apk
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wishsender
          path: output/wishsender.apk
          retention-days: 30
