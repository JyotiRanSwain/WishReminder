name: Build WishReminder APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Cordova
        run: npm install -g cordova@12.0.0

      - name: Install npm dependencies
        run: npm install

      - name: Prepare Platform
        run: cordova platform add android@12.0.1 --save

      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-device
          cordova plugin add ./plugin
          cordova plugin list

      # This step is critical: It forces the use of a compatible Gradle version 
      # and prevents the runner from using the incompatible Gradle 9.x
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Build Debug APK
        # We use --device to skip emulator checks and ensure standard build
        run: cordova build android --debug --verbose

      - name: Rename to wishsender.apk
        run: |
          mkdir -p output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/wishsender.apk \;
          ls -lh output/wishsender.apk

      - name: Upload wishsender.apk
        uses: actions/upload-artifact@v4
        with:
          name: wishsender
          path: output/wishsender.apk
          retention-days: 30
