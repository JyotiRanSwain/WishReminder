name: Build WishReminder APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Gradle 8.7 (cordova-android 12 requires Gradle 8.x)
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt/gradle
          sudo ln -sf /opt/gradle/gradle-8.7/bin/gradle /usr/local/bin/gradle
          gradle --version

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Install Cordova 12
        run: npm install -g cordova@12.0.0

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform 12.0.1
        run: cordova platform add android@12.0.1 --save

      - name: Force Gradle wrapper to 8.7
        run: |
          PROPS=$(find platforms/android -name "gradle-wrapper.properties" | head -1)
          echo "Found wrapper at: $PROPS"
          echo "distributionBase=GRADLE_USER_HOME"          >  $PROPS
          echo "distributionPath=wrapper/dists"             >> $PROPS
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-bin.zip" >> $PROPS
          echo "zipStoreBase=GRADLE_USER_HOME"              >> $PROPS
          echo "zipStorePath=wrapper/dists"                 >> $PROPS
          cat $PROPS

      - name: Install Cordova plugins
        run: |
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-device
          cordova plugin add ./plugin
          cordova plugin list

      - name: Build Debug APK
        run: cordova build android --debug

      - name: Rename to wishsender.apk
        run: |
          mkdir -p output
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk output/wishsender.apk
          ls -lh output/wishsender.apk

      - name: Upload wishsender.apk
        uses: actions/upload-artifact@v4
        with:
          name: wishsender
          path: output/wishsender.apk
          retention-days: 30
