name: Build WishReminder APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Install Specific Build Tools 33.0.2
        run: |
          sdkmanager "build-tools;33.0.2"

      - name: Install Cordova
        run: npm install -g cordova@12.0.0

      - name: Install npm dependencies
        run: npm install

      - name: Fresh Prepare Platform and Local Plugin
        run: |
          rm -rf platforms/android
          rm -rf plugins/cordova-plugin-wish-sender
          cordova plugin add ./plugin
          cordova platform add android@12.0.1 --save
          cordova prepare android

      - name: Build Release APK
        env:
          CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL: https://services.gradle.org/distributions/gradle-8.7-bin.zip
        run: cordova build android --release --device

      - name: Rename and Move APK
        if: success()
        run: |
          mkdir -p output
          find platforms/android/app/build/outputs/apk/release/ -name "*.apk" -exec cp {} output/wishsender.apk \;

      - name: Upload wishsender.apk
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wishsender
          path: output/wishsender.apk
          retention-days: 30
