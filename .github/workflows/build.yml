name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: android-actions/setup-android@v3

      - name: Install Cordova CLI
        run: npm install -g cordova@12

      - name: Install npm deps
        run: npm install

      - name: Add Android platform
        run: cordova platform add android@13 --save

      - name: Install standard plugins
        run: |
          cordova plugin add cordova-plugin-whitelist
          cordova plugin add cordova-plugin-inappbrowser
          cordova plugin add cordova-plugin-device

      - name: Install local WishSender plugin
        run: cordova plugin add .

      - name: Build Debug APK
        run: cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WishReminder-v2-debug
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
