<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>WishReminder</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- SPLASH -->
  <div id="splash">
    <div class="splash-inner">
      <div class="splash-icon">🎉</div>
      <h1 class="splash-title">WishReminder</h1>
      <p class="splash-sub">Send love, on time.</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden">

    <!-- Accessibility Banner (shown when service not enabled) -->
    <div id="accessBanner" class="access-banner hidden">
      <div class="access-banner-text">
        <strong>Enable Auto-Send</strong><br>
        Allow WishReminder to tap Send in WhatsApp automatically.
      </div>
      <button id="accessBtn" class="access-banner-btn">Enable Now</button>
    </div>

    <!-- Tab Bar -->
    <nav class="tab-bar">
      <button class="tab active" data-tab="add">
        <span class="tab-icon">＋</span>
        <span>Add Event</span>
      </button>
      <button class="tab" data-tab="events">
        <span class="tab-icon">📋</span>
        <span>My Events</span>
      </button>
    </nav>

    <!-- ADD EVENT TAB -->
    <section id="tab-add" class="tab-content active">
      <div class="page-header">
        <h2>New Reminder</h2>
        <p>Schedule your heartfelt wish</p>
      </div>

      <div class="form-card">

        <div class="field-group">
          <label class="field-label"><span class="label-icon">👤</span> Recipient Name</label>
          <input type="text" id="recipientName" class="field-input" placeholder="e.g. Rohit Sharma" />
        </div>

        <div class="field-group">
          <label class="field-label"><span class="label-icon">🎊</span> Occasion</label>
          <div class="select-wrapper">
            <select id="eventType" class="field-input">
              <option value="">— Choose an occasion —</option>
              <option value="birthday">🎂 Happy Birthday</option>
              <option value="anniversary">💍 Anniversary</option>
              <option value="wedding">💒 Wedding Day</option>
              <option value="graduation">🎓 Graduation</option>
              <option value="newYear">🎆 New Year</option>
              <option value="diwali">🪔 Diwali</option>
              <option value="eid">🌙 Eid Mubarak</option>
              <option value="christmas">🎄 Christmas</option>
              <option value="promotion">💼 Job Promotion</option>
              <option value="newBaby">👶 New Baby</option>
              <option value="farewell">✈️ Farewell</option>
              <option value="getWell">🌷 Get Well Soon</option>
              <option value="thankyou">🙏 Thank You</option>
              <option value="congratulations">🏆 Congratulations</option>
              <option value="other">✏️ Other (Custom)</option>
            </select>
          </div>
        </div>

        <div class="field-group hidden" id="customEventGroup">
          <label class="field-label"><span class="label-icon">✏️</span> Custom Occasion Name</label>
          <input type="text" id="customEventName" class="field-input" placeholder="e.g. Work Anniversary" />
        </div>

        <div class="field-group">
          <label class="field-label"><span class="label-icon">📅</span> Date</label>
          <input type="date" id="eventDate" class="field-input" />
        </div>

        <div class="field-group">
          <label class="field-label"><span class="label-icon">⏰</span> Time to Send</label>
          <input type="time" id="eventTime" class="field-input" />
        </div>

        <div class="field-group">
          <label class="field-label"><span class="label-icon">📱</span> WhatsApp Number</label>
          <div class="phone-row">
            <div class="select-wrapper country-select-wrap">
              <select id="countryCode" class="field-input country-code">
                <option value="+91">🇮🇳 +91</option>
                <option value="+1">🇺🇸 +1</option>
                <option value="+44">🇬🇧 +44</option>
                <option value="+61">🇦🇺 +61</option>
                <option value="+971">🇦🇪 +971</option>
                <option value="+966">🇸🇦 +966</option>
                <option value="+880">🇧🇩 +880</option>
                <option value="+92">🇵🇰 +92</option>
                <option value="+94">🇱🇰 +94</option>
                <option value="+977">🇳🇵 +977</option>
                <option value="+65">🇸🇬 +65</option>
                <option value="+60">🇲🇾 +60</option>
                <option value="+49">🇩🇪 +49</option>
                <option value="+33">🇫🇷 +33</option>
                <option value="+55">🇧🇷 +55</option>
                <option value="+27">🇿🇦 +27</option>
                <option value="+234">🇳🇬 +234</option>
              </select>
            </div>
            <input type="tel" id="mobileNumber" class="field-input phone-input" placeholder="98765 43210" maxlength="15" />
          </div>
        </div>

        <div class="field-group" id="previewGroup" style="display:none;">
          <label class="field-label"><span class="label-icon">💬</span> Message Preview</label>
          <div class="message-preview" id="messagePreview"></div>
        </div>

        <button class="btn-save" id="saveBtn">
          <span class="btn-icon">💾</span> Save Reminder
        </button>

      </div>
    </section>

    <!-- EVENTS LIST TAB -->
    <section id="tab-events" class="tab-content">
      <div class="page-header">
        <h2>My Reminders</h2>
        <p>Upcoming wishes scheduled</p>
      </div>
      <div id="eventsList" class="events-list"></div>
    </section>

  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="cordova.js" onerror="console.log('Laptop mode: Cordova not loaded')"></script>
  <script src="js/app.js"></script>
</body>
</html>
